<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>A Gift · 礼</title>
<!-- iOS home-screen pin -->
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="礼">
<meta name="theme-color" content="#6B5544">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FCFCFB;
  --ink: #141414;
  --accent: #6B5544;
  --accent-soft: rgba(107, 85, 68, 0.08);
  --muted: #8C8C8C;
  --border: #D8D8D4;
  --soft: #F4F4F2;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --serif-en: 'Cormorant Garamond', Georgia, serif;
  --serif-cn: 'Noto Serif SC', 'PingFang SC', serif;
  --topbar-h: 52px;
  --progress-h: 28px;
  --bottombar-h: 80px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
body {
  background: #E8E8E4;
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "tnum";
}
button { font-family: inherit; background: none; border: none; color: inherit; cursor: pointer; }

#app {
  width: 100%; max-width: 440px;
  height: 100dvh;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
  background: var(--bg);
  display: flex; flex-direction: column;
}
@media (min-width: 441px) {
  #app { box-shadow: 0 0 0 1px var(--border); }
}

/* Topbar */
.topbar {
  position: relative; z-index: 10;
  height: var(--topbar-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
}
.topbar .brand-mark {
  display: flex; align-items: baseline; gap: 8px;
}
.topbar .brand-mark .ch { font-family: var(--serif-cn); font-size: 17px; font-weight: 500; }
.topbar .brand-mark .en { font-family: var(--serif-en); font-style: italic; font-size: 13px; color: var(--muted); letter-spacing: 0.04em; }
.topbar .actions { display: flex; gap: 14px; align-items: center; }
.lang-toggle {
  font-family: var(--serif-en); font-style: italic;
  font-size: 12px; color: var(--muted); letter-spacing: 0.06em;
  display: flex; gap: 4px; align-items: center;
}
.lang-toggle .opt { padding: 2px 4px; }
.lang-toggle .opt.active { color: var(--ink); }
.lang-toggle .sep { color: var(--border); }
.btn-close {
  font-size: 22px; color: var(--muted); width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 300; line-height: 1;
}

/* Progress dots */
.progress {
  height: var(--progress-h);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  flex-shrink: 0;
}
.progress .dot { width: 4px; height: 4px; background: var(--border); }
.progress .dot.active { background: var(--ink); width: 14px; }
.progress .dot.past { background: var(--accent); }

/* Main content area */
.screen {
  flex: 1;
  min-height: 0;
  display: flex; flex-direction: column;
  padding: 8px 28px 0;
  overflow: hidden;
}
.screen.welcome-screen, .screen.result-screen { padding: 0; }

.fade-up > * { opacity: 0; transform: translateY(8px); animation: fu 0.55s ease forwards; }
.fade-up > *:nth-child(1) { animation-delay: 0.04s; }
.fade-up > *:nth-child(2) { animation-delay: 0.10s; }
.fade-up > *:nth-child(3) { animation-delay: 0.18s; }
.fade-up > *:nth-child(4) { animation-delay: 0.26s; }
.fade-up > *:nth-child(5) { animation-delay: 0.34s; }
.fade-up > *:nth-child(n+6) { animation-delay: 0.42s; }
@keyframes fu { to { opacity: 1; transform: translateY(0); } }

.step-head { margin: 6px 0 20px; flex-shrink: 0; }
.step-meta { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
.step-meta .num {
  font-family: var(--serif-en); font-style: italic;
  font-size: 13px; color: var(--accent); letter-spacing: 0.10em;
}
.step-meta .of {
  font-family: var(--serif-en); font-style: italic;
  font-size: 11px; color: var(--muted); letter-spacing: 0.06em;
}
.step-meta::after {
  content: ''; flex: 1; height: 1px; background: var(--border); margin-left: 4px;
}
.step-title {
  font-family: var(--serif-cn); font-size: 25px; font-weight: 500;
  line-height: 1.3; letter-spacing: 0.02em;
}
.step-title.lang-en { font-family: var(--serif-en); font-style: italic; font-weight: 500; font-size: 30px; letter-spacing: 0.01em; }
.step-sub {
  font-family: var(--serif-en); font-style: italic; font-size: 15px;
  color: var(--accent); margin-top: 6px; letter-spacing: 0.01em;
}
.step-sub.lang-en { font-family: var(--serif-cn); font-style: normal; color: var(--muted); font-size: 13px; }
.step-hint { font-size: 11.5px; color: var(--muted); margin-top: 12px; letter-spacing: 0.02em; line-height: 1.6; }

/* Tag groups */
.tag-groups { flex: 1; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; padding-bottom: 12px; }
.tag-groups::-webkit-scrollbar { display: none; }
.tag-group .group-label {
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px; font-weight: 500;
}
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  border: 1px solid var(--border);
  padding: 8px 14px;
  font-size: 12.5px;
  color: var(--ink);
  background: var(--bg);
  white-space: nowrap;
  transition: background-color 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.12s ease;
  font-family: var(--sans);
  letter-spacing: 0.01em;
  line-height: 1.3;
}
.tag.selected { background: var(--ink); color: #fff; border-color: var(--ink); }
.tag:hover:not(.selected) { border-color: var(--ink); background: var(--soft); }
.tag:active { transform: scale(0.97); }
.tag.disabled { opacity: 0.4; pointer-events: none; }

/* Slider */
.slider-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px 4px; }
.slider-value { text-align: center; margin-bottom: 36px; min-height: 80px; display: flex; flex-direction: column; justify-content: flex-end; }
.slider-value .num {
  font-family: var(--serif-en); font-style: italic;
  font-size: 44px; color: var(--accent); font-weight: 400; line-height: 1;
}
.slider-value .num.closeness-word {
  font-family: var(--serif-cn); font-style: normal;
  font-size: 30px; letter-spacing: 0.10em; font-weight: 500;
}
.slider-value .sublabel {
  font-family: var(--serif-cn); font-size: 13px; color: var(--muted);
  margin-top: 10px; letter-spacing: 0.06em; min-height: 18px;
}

.slider-track { position: relative; height: 40px; cursor: pointer; }
.slider-line { position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); transform: translateY(-50%); }
.slider-fill { position: absolute; top: 50%; left: 0; height: 1px; background: var(--accent); transform: translateY(-50%); }
.slider-thumb {
  position: absolute; top: 50%; width: 18px; height: 18px;
  background: var(--bg); border: 1.5px solid var(--ink);
  transform: translate(-50%, -50%);
  cursor: grab; transition: transform 0.1s ease;
}
.slider-thumb.grab { transform: translate(-50%, -50%) scale(1.15); cursor: grabbing; }
.slider-ticks { display: flex; justify-content: space-between; margin-top: 6px; padding: 0 1px; }
.slider-tick { width: 1px; height: 5px; background: var(--border); }
.slider-tick.major { height: 8px; background: var(--muted); }
.slider-legend { display: flex; justify-content: space-between; margin-top: 8px; font-family: var(--serif-en); font-style: italic; font-size: 11px; color: var(--muted); letter-spacing: 0.04em; }

/* Closeness slider — labels */
.slider-labels {
  margin-top: 14px;
  display: grid; grid-template-columns: repeat(7, 1fr);
  font-size: 9px; color: var(--muted); text-align: center;
}
.slider-labels span { padding: 0 2px; line-height: 1.2; }
.slider-labels span.active { color: var(--ink); font-weight: 500; }

/* Brand step */
.brand-step { flex: 1; display: flex; flex-direction: column; min-height: 0; gap: 8px; }
.brand-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px;
  flex: 1; min-height: 0;
  align-content: start;
  overflow-y: auto;
  padding-right: 2px;
}
.brand-grid::-webkit-scrollbar { width: 0; }
.brand-card {
  border: 1px solid var(--border);
  padding: 14px 10px 0;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  position: relative;
  background: var(--bg);
  transition: border-color 0.2s ease, background-color 0.2s ease, opacity 0.2s ease;
  min-height: 92px;
}
.brand-card.state-own { border-color: var(--ink); background: var(--soft); }
.brand-card.state-want { border-color: var(--accent); background: var(--accent-soft); }
.brand-card.state-skip { opacity: 0.42; }
.brand-name {
  font-family: var(--serif-en); font-style: italic;
  font-size: 14px; color: var(--ink); letter-spacing: 0.02em;
  text-align: center; line-height: 1.25;
  flex: 1; display: flex; align-items: center; padding: 2px 0;
}
.brand-tier {
  position: absolute; top: 6px; right: 8px;
  font-size: 8px; color: var(--muted);
  letter-spacing: 0.18em; text-transform: uppercase;
  font-family: var(--serif-en); font-style: italic;
}
.brand-actions {
  display: flex; gap: 0; width: 100%; margin-top: 10px;
  border-top: 1px solid var(--border);
}
.brand-action {
  flex: 1;
  border-right: 1px solid var(--border);
  padding: 8px 0;
  font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
  transition: background-color 0.15s ease, color 0.15s ease;
}
.brand-action:last-child { border-right: none; }
.brand-action:hover:not(.active) { background: var(--soft); color: var(--ink); }
.brand-action.active { color: #fff; }
.brand-action.active.own { background: var(--ink); }
.brand-action.active.want { background: var(--accent); }
.brand-action.active.skip { background: var(--muted); }

.swap-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0;
  flex-shrink: 0;
}
.swap-btn {
  font-size: 11px; color: var(--accent);
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 6px 0; border-bottom: 1px solid var(--accent);
}
.batch-counter {
  font-size: 11px; color: var(--muted);
  font-family: var(--serif-en); font-style: italic;
  letter-spacing: 0.04em;
}

.accumulator {
  padding: 10px 0 4px;
  border-top: 1px solid var(--border);
  max-height: 100px;
  display: flex; flex-direction: column;
  flex-shrink: 0;
}
.accumulator-label {
  font-size: 9px; color: var(--muted);
  letter-spacing: 0.18em; text-transform: uppercase;
  margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: baseline;
}
.accumulator-label .count {
  font-family: var(--serif-en); font-style: italic;
  text-transform: none; letter-spacing: 0.04em;
  font-size: 12px; color: var(--accent);
}
.chips { display: flex; flex-wrap: wrap; gap: 5px; overflow-y: auto; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 9px 4px 10px; font-size: 11px;
  border: 1px solid var(--border);
  font-family: var(--serif-en); font-style: italic; letter-spacing: 0.02em;
  line-height: 1.2;
  transition: opacity 0.15s ease;
}
.chip.own { background: var(--ink); color: #fff; border-color: var(--ink); }
.chip.want { background: var(--accent); color: #fff; border-color: var(--accent); }
.chip.skip { background: var(--soft); color: var(--muted); }
.chip .x { font-style: normal; opacity: 0.55; cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px; }
.chip .x:hover { opacity: 1; }

/* Bottom bar */
.bottombar {
  height: var(--bottombar-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 24px;
  gap: 12px;
  flex-shrink: 0;
}
.btn-back {
  font-size: 11px; color: var(--muted);
  letter-spacing: 0.10em; text-transform: uppercase;
  padding: 12px 14px;
}
.btn-back .arrow { margin-right: 6px; }
.btn-next {
  flex: 1; max-width: 260px; margin-left: auto;
  background: var(--ink); color: #fff;
  font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
  padding: 16px 22px; font-weight: 500;
  transition: background-color 0.18s ease;
}
.btn-next:not(:disabled):hover { background: var(--accent); }
.btn-next:disabled { background: var(--soft); cursor: not-allowed; color: var(--muted); border: 1px solid var(--border); }
.btn-next .arrow { margin-left: 10px; }
.btn-back { transition: color 0.18s ease; }
.btn-back:hover { color: var(--ink); }

/* Welcome */
.welcome {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 28px; text-align: center; padding: 40px 32px;
}
.welcome-mark {
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  padding: 24px 40px 28px;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.welcome-char {
  font-family: var(--serif-cn); font-size: 64px; font-weight: 400;
  color: var(--ink); line-height: 1;
}
.welcome-name {
  font-family: var(--serif-en); font-style: italic;
  font-size: 22px; letter-spacing: 0.10em;
  color: var(--accent);
  text-transform: uppercase;
}
.welcome-tagline {
  font-family: var(--serif-cn); font-size: 13px; color: var(--ink);
  max-width: 260px; line-height: 1.9; letter-spacing: 0.04em;
}
.welcome-tagline .en {
  display: block; font-family: var(--serif-en); font-style: italic;
  font-size: 12px; margin-top: 10px; color: var(--muted);
  letter-spacing: 0.02em;
}
.welcome-cta {
  margin-top: 4px; background: var(--ink); color: #fff;
  padding: 16px 52px;
  font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
  transition: background-color 0.18s ease;
}
.welcome-cta:hover { background: var(--accent); }
.welcome-foot {
  position: absolute; bottom: 22px; left: 0; right: 0;
  text-align: center;
  font-family: var(--serif-en); font-style: italic;
  font-size: 10px; color: var(--muted); letter-spacing: 0.14em;
}

/* Result page */
.result-screen { position: relative; overflow: hidden; }
.result-deck {
  position: relative; width: 100%; height: 100%;
  touch-action: pan-y;
}
.result-card {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column;
  background: var(--bg);
  transition: transform 0.42s cubic-bezier(0.22, 0.61, 0.36, 1);
  will-change: transform;
  overflow-y: auto;
  padding-bottom: 60px;
}
.result-card::-webkit-scrollbar { display: none; }
.result-meta {
  padding: 12px 28px 8px;
  display: flex; align-items: center; justify-content: space-between;
}
.result-pos {
  font-family: var(--serif-en); font-style: italic;
  font-size: 12px; color: var(--muted); letter-spacing: 0.04em;
}
.result-score {
  font-family: var(--serif-en); font-style: italic;
  font-size: 22px; color: var(--accent); letter-spacing: 0.02em;
}
.result-img {
  margin: 8px 28px 0;
  aspect-ratio: 4/3.2;
  background: var(--soft);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}
.result-img svg { width: 38%; height: 38%; stroke: var(--accent); fill: none; stroke-width: 1; }
.result-cat {
  padding: 16px 28px 4px;
  font-family: var(--serif-en); font-style: italic;
  font-size: 10px; color: var(--accent);
  letter-spacing: 0.20em; text-transform: uppercase;
}
.result-brand {
  padding: 0 28px;
  font-family: var(--serif-en); font-style: italic;
  font-size: 12px; color: var(--muted);
  letter-spacing: 0.14em; text-transform: uppercase;
  margin-bottom: 6px;
}
.result-name {
  padding: 0 28px;
  font-family: var(--serif-cn); font-size: 18px; font-weight: 500;
  line-height: 1.35; margin-bottom: 4px;
}
.result-name.lang-en { font-family: var(--serif-en); font-style: italic; font-size: 22px; }
.result-name-alt {
  padding: 0 28px;
  font-family: var(--serif-en); font-style: italic;
  font-size: 13px; color: var(--muted); margin-bottom: 8px;
}
.result-name-alt.lang-en { font-family: var(--serif-cn); font-style: normal; font-size: 13px; }
.result-price {
  padding: 0 28px;
  font-family: var(--serif-en); font-style: italic;
  font-size: 19px; color: var(--ink); margin-bottom: 14px;
}
.result-desc {
  padding: 0 28px;
  font-size: 12px; color: var(--ink); line-height: 1.7;
  margin-bottom: 14px;
  font-family: var(--serif-cn);
}
.result-desc.lang-en { font-family: var(--sans); font-size: 13px; color: var(--ink); }
.result-tags {
  padding: 0 28px;
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 22px;
}
.result-tags .tag { padding: 5px 10px; font-size: 10px; }
.result-tags .tag.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
.result-cta { margin: auto 28px 28px; padding-top: 12px; }
.result-cta button {
  width: 100%; background: var(--ink); color: #fff;
  padding: 15px; font-size: 11px;
  letter-spacing: 0.18em; text-transform: uppercase;
  transition: background-color 0.18s ease;
  cursor: pointer;
}
.result-cta button:hover { background: var(--accent); }
.result-cta .platform {
  font-family: var(--serif-en); font-style: italic;
  margin-left: 6px; text-transform: none; letter-spacing: 0.02em; color: rgba(255,255,255,0.7);
}

/* Refinement card */
.refine-card { padding: 28px; display: flex; flex-direction: column; height: 100%; }
.refine-title {
  font-family: var(--serif-cn); font-size: 22px; font-weight: 500;
  margin-top: 28px; margin-bottom: 4px;
}
.refine-title.lang-en { font-family: var(--serif-en); font-style: italic; font-size: 28px; }
.refine-title .alt {
  display: block; font-family: var(--serif-en); font-style: italic;
  font-size: 15px; color: var(--accent); margin-top: 6px; font-weight: 400;
}
.refine-title.lang-en .alt { font-family: var(--serif-cn); font-style: normal; font-size: 13px; color: var(--muted); }
.refine-list { margin-top: 28px; }
.refine-item {
  padding: 18px 0; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  font-size: 14px; cursor: pointer;
  letter-spacing: 0.02em;
}
.refine-item:hover { color: var(--accent); }
.refine-item .arrow { color: var(--muted); font-family: var(--serif-en); font-style: italic; }
.refine-tip {
  margin-top: auto;
  background: var(--soft); border-left: 2px solid var(--accent);
  padding: 18px 20px;
  font-family: var(--serif-cn); font-size: 13px; color: var(--ink);
  line-height: 1.8; letter-spacing: 0.02em;
}
.refine-tip .alt {
  display: block; font-family: var(--serif-en); font-style: italic;
  font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.6;
}

/* Result dots */
.result-dots {
  position: absolute; bottom: 18px; left: 0; right: 0;
  display: flex; justify-content: center; gap: 6px; z-index: 5;
  pointer-events: none;
}
.result-dots .dot { width: 4px; height: 4px; background: var(--border); cursor: pointer; pointer-events: auto; transition: all 0.3s ease; }
.result-dots .dot.active { background: var(--ink); width: 14px; }

.result-topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  background: linear-gradient(to bottom, var(--bg) 60%, transparent);
}

/* Small screen */
@media (max-height: 700px) {
  .step-title { font-size: 22px; }
  .step-head { margin-bottom: 12px; }
  :root { --bottombar-h: 72px; }
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ============== I18N ==============
const T = {
  brand: { zh: '礼', en: 'A GIFT' },
  brandSub: { zh: '送礼决策', en: 'A Gift' },
  begin: { zh: '开 始', en: 'BEGIN' },
  next: { zh: '下一步', en: 'NEXT' },

  const a = BRANDS.slice();

  for (let i = a.length - 1; i > 0; i--) {
    const j = (i * 7 + 3) % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];

})();

// ============== RECOMMENDATION ENGINE ==============
function recommend() {
  const budgetSGD = BUDGET_STEPS[STATE.budgetIdx];
  const budgetRMB = budgetSGD * 5.3;
  const excludedCats = new Set(STATE.givenBefore);
  const skippedBrands = new Set(Object.entries(STATE.brands).filter(([_,v])=>v==='skip').map(([k])=>k));
  const wantedBrands = new Set(Object.entries(STATE.brands).filter(([_,v])=>v==='want').map(([k])=>k));
  const ownedBrands = new Set(Object.entries(STATE.brands).filter(([_,v])=>v==='own').map(([k])=>k));

  // PRD: ±15% budget, then relax to ±50% if needed
  function fits(price, tol) {
    return price >= budgetRMB * (1 - tol) && price <= budgetRMB * (1 + tol);
  }

  function scoreItem(item, tol) {
    if (!fits(item.price, tol)) return -1;
    if (skippedBrands.has(item.brand)) return -1;
    if (excludedCats.has(catFamilyFor(item))) return -1;
    let s = 50;
    if (wantedBrands.has(item.brand)) s += 40;
    if (ownedBrands.has(item.brand)) s -= 30; // avoid direct repeat
    // intent match
    const intentSet = new Set(STATE.intent);
    const intentMatch = (item.tags || []).filter(tg => intentSet.has(tg)).length;
    s += intentMatch * 14;
    // budget proximity: closer to budget = better; main pick at or below
    const ratio = item.price / budgetRMB;
    if (ratio <= 1) s += 8;
    s -= Math.abs(1 - ratio) * 10;
    // closeness adjustment: low closeness deprioritises intimate cats
    const intimateCats = new Set(['skincare', 'fragrance', 'jewellery']);
    if (STATE.closeness <= 2 && intimateCats.has(CAT_MAP[item.cat])) s -= 18;
    if (STATE.closeness >= 5 && intimateCats.has(CAT_MAP[item.cat])) s += 8;
    // social occasions favor safe categories
    return s;
  }

  function pickByCategoryDiverse(tol) {
    const candidates = ITEMS
      .map(it => ({ ...it, score: scoreItem(it, tol) }))
      .filter(it => it.score > 0)
      .sort((a,b) => b.score - a.score);
    const picks = [];
    const usedCats = new Set();
    for (const c of candidates) {
      const cat = CAT_MAP[c.cat];
      if (!usedCats.has(cat)) {
        picks.push(c);
        usedCats.add(cat);
        if (picks.length === 3) break;
      }
    }
    return picks;
  }

  function catFamilyFor(item) {
    const c = CAT_MAP[item.cat];
    // map result-categories to given-before excludes
    if (c === 'fragrance') return 'fragrance';
    if (c === 'home' && (item.cat === 'C02')) return 'candle';
    if (c === 'bag') return 'bag';
    if (c === 'jewellery') return 'jewellery';
    if (c === 'watch') return 'watch';
    if (c === 'skincare') return 'skincare';
    if (item.cat === 'C17') return 'wine';
    if (item.cat === 'C15') return 'tea';
    if (c === 'tech') return 'tech';
    if (item.cat === 'C18') return 'pen';
    return null;
  }

  let picks = pickByCategoryDiverse(0.5);
  if (picks.length < 3) picks = pickByCategoryDiverse(0.9);
  if (picks.length < 3) picks = pickByCategoryDiverse(2.0);

  // Final fallback: just pick top 3 with category diversity loose
  if (picks.length < 3) {
    const fallback = ITEMS.slice().sort((a,b) => Math.abs(a.price - budgetRMB) - Math.abs(b.price - budgetRMB));
    picks = fallback.slice(0, 3);
  }

  const scores = [98, 91, 87];
  return picks.slice(0, 3).map((p, i) => ({ ...p, displayScore: scores[i] || 80 }));
}

function setNextState(enabled, label) {

function clearGroupSelection(scope) {
  scope.querySelectorAll('.tag.selected').forEach(t => t.classList.remove('selected'));
}
function toggleTagClass(btn, on) {
  btn.classList.toggle('selected', on);
}
function setBrand(bid, state) {
  if (state == null || STATE.brands[bid] === state) delete STATE.brands[bid];
  else STATE.brands[bid] = state;
  const card = document.querySelector(`[data-bid="${bid}"]`);
  if (card) {
    card.className = 'brand-card' + (STATE.brands[bid] ? ' state-' + STATE.brands[bid] : '');
    card.querySelectorAll('.brand-action').forEach(btn => {
      btn.classList.toggle('active', STATE.brands[bid] === btn.dataset.state);
    });
  }
  redrawAccumulator();
}
function redrawAccumulator() {
  const wrap = document.querySelector('.brand-step');
  if (!wrap) return;
  const existing = wrap.querySelector('.accumulator');
  if (existing) existing.remove();
  const entries = Object.entries(STATE.brands);
  if (entries.length === 0) return;
  const accum = el('div', 'accumulator');
  const lbl = el('div', 'accumulator-label');
  lbl.innerHTML = `<span>${t('accumLabel')}</span><span class="count">${entries.length}</span>`;
  accum.appendChild(lbl);
  const chips = el('div', 'chips');
  const order = { own: 0, want: 1, skip: 2 };
  entries.sort((a, b) => order[a[1]] - order[b[1]]);
  entries.forEach(([bid, st]) => {
    const br = BRAND_BY_ID[bid];
    if (!br) return;
    const chip = el('span', 'chip ' + st);
    chip.innerHTML = `${br.name || br.name_zh}<span class="x">×</span>`;
    chip.querySelector('.x').onclick = (e) => { e.stopPropagation(); setBrand(bid, null); };
    chips.appendChild(chip);
  });
  accum.appendChild(chips);
  wrap.appendChild(accum);
}

  if (_ABORT) _ABORT.abort();
  _ABORT = new AbortController();

  else if (STATE.step >= 1 && STATE.step <= 8) renderStep(app);

}

function progressDots(active) {
  const wrap = el('div', 'progress');
  for (let i = 1; i <= 8; i++) {
    const d = el('div', 'dot' + (i === active ? ' active' : i < active ? ' past' : ''));
    wrap.appendChild(d);
  }
  return wrap;
}

function bottomBar(opts) {
  // opts: { showBack=true, nextLabel=t('next'), nextEnabled=true, onNext, onBack, secondaryLabel, onSecondary }
  const bar = el('div', 'bottombar');
  if (opts.showBack !== false) {
    const back = el('button', 'btn-back');
    back.innerHTML = `<span class="arrow">←</span>${t('back')}`;
    back.onclick = opts.onBack || (() => { STATE.step--; render(); });
    bar.appendChild(back);
  } else { bar.appendChild(el('div')); }
  if (opts.secondaryLabel) {
    const sec = el('button', 'btn-back');
    sec.textContent = opts.secondaryLabel;
    sec.onclick = opts.onSecondary;
    bar.appendChild(sec);
  }
  const next = el('button', 'btn-next');
  next.innerHTML = (opts.nextLabel || t('next')) + ' <span class="arrow">→</span>';
  next.disabled = opts.nextEnabled === false;
  next.onclick = opts.onNext;
  bar.appendChild(next);
  return bar;
}

function stepHead(num, total, titleKey, subKey, hintKey) {

function renderS3(screen) {
  screen.appendChild(stepHead(3, 8, 's3Title', 's3Sub', 's3Hint'));
  const wrap = el('div', 'slider-wrap fade-up');
  const labels = T.closenessLabels[STATE.lang];
  const subs = T.closenessSub[STATE.lang];
  const value = el('div', 'slider-value');
  const updateValue = () => {
    value.innerHTML = `<div class="num closeness-word">${labels[STATE.closeness]}</div><div class="sublabel">${subs[STATE.closeness]}</div>`;
  };
  updateValue();
  wrap.appendChild(value);

  const track = el('div', 'slider-track');
  const line = el('div', 'slider-line');
  const fill = el('div', 'slider-fill');
  const thumb = el('div', 'slider-thumb');
  track.appendChild(line); track.appendChild(fill); track.appendChild(thumb);

  const ticks = el('div', 'slider-ticks');
  for (let i = 0; i < 7; i++) ticks.appendChild(el('div', 'slider-tick' + (i % 3 === 0 ? ' major' : '')));

  const labRow = el('div', 'slider-labels');
  labels.forEach((l, i) => {
    const s = el('span', i === STATE.closeness ? 'active' : '', l);
    labRow.appendChild(s);
  });

  function setPos() {
    const pct = STATE.closeness / 6;
    thumb.style.left = (pct * 100) + '%';
    fill.style.width = (pct * 100) + '%';
  }
  setPos();

  function handlePos(x) {
    const rect = track.getBoundingClientRect();
    const t = Math.max(0, Math.min(1, (x - rect.left) / rect.width));
    const idx = Math.round(t * 6);
    if (idx !== STATE.closeness) {
      STATE.closeness = idx;
      setPos(); updateValue();
      labRow.querySelectorAll('span').forEach((s, i) => s.classList.toggle('active', i === idx));
    }
  }
  let dragging = false;
  const onDown = (e) => { dragging = true; thumb.classList.add('grab'); const x = e.touches? e.touches[0].clientX : e.clientX; handlePos(x); e.preventDefault(); };
  const onMove = (e) => { if (!dragging) return; const x = e.touches? e.touches[0].clientX : e.clientX; handlePos(x); };
  const onUp = () => { dragging = false; thumb.classList.remove('grab'); };
  track.addEventListener('mousedown', onDown);
  track.addEventListener('touchstart', onDown, { passive: false });
  onWindow('mousemove', onMove);
  onWindow('touchmove', onMove, { passive: false });
  onWindow('mouseup', onUp);
  onWindow('touchend', onUp);

  wrap.appendChild(track);
  wrap.appendChild(ticks);
  wrap.appendChild(labRow);
  screen.appendChild(wrap);
  document.getElementById('app').appendChild(bottomBar({
    onNext: () => { STATE.step = 4; render(); },
  }));

function renderResult(app) {
  app.appendChild(topbar());
  const screen = el('div', 'screen result-screen');
  const deck = el('div', 'result-deck');

  const cards = STATE.results.map((r, i) => buildResultCard(r, i)).concat([buildRefineCard()]);
  cards.forEach((c, i) => {
    c.style.transform = `translateX(${(i - STATE.resultCard) * 100}%)`;
    deck.appendChild(c);
  });

  // dots
  const dots = el('div', 'result-dots');
  for (let i = 0; i < 4; i++) {
    const d = el('div', 'dot' + (i === STATE.resultCard ? ' active' : ''));
    d.onclick = () => { STATE.resultCard = i; updateDeck(); };
    dots.appendChild(d);
  }

  function updateDeck() {
    deck.querySelectorAll('.result-card').forEach((c, i) => {
      c.style.transform = `translateX(${(i - STATE.resultCard) * 100}%)`;
    });
    dots.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === STATE.resultCard));
  }

  // Swipe with direction lock + reflow fix
  let startX = 0, startY = 0, dx = 0, swiping = false, axis = null, pointerKind = null;
  const cardsList = () => deck.querySelectorAll('.result-card');
  const DIRECTION_LOCK = 8;
  const SWIPE_THRESHOLD = 50;

  const onStart = (e, kind) => {
    // Ignore duplicate event from synthetic mouse after touch
    if (swiping) return;
    swiping = true; axis = null; dx = 0; pointerKind = kind;
    startX = (e.touches ? e.touches[0].clientX : e.clientX);
    startY = (e.touches ? e.touches[0].clientY : e.clientY);
  };
  const onMove = (e) => {
    if (!swiping) return;
    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    const y = (e.touches ? e.touches[0].clientY : e.clientY);
    dx = x - startX;
    const dy = y - startY;
    if (axis === null) {
      if (Math.abs(dx) < DIRECTION_LOCK && Math.abs(dy) < DIRECTION_LOCK) return;
      axis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
      if (axis === 'x') {
        cardsList().forEach(c => c.style.transition = 'none');
      } else {
        // Vertical: yield to native scroll inside the card
        swiping = false; return;
      }
    }
    cardsList().forEach((c, i) => {
      c.style.transform = `translateX(calc(${(i - STATE.resultCard) * 100}% + ${dx}px))`;
    });
  };
  const onEnd = (e, kind) => {
    if (!swiping) return;
    // Only the matching pointer type ends the swipe (prevents touch+mouse double fire)
    if (pointerKind && kind && pointerKind !== kind) return;
    swiping = false;
    if (axis === 'x') {
      if (Math.abs(dx) > SWIPE_THRESHOLD) {
        if (dx < 0 && STATE.resultCard < cardsList().length - 1) STATE.resultCard++;
        else if (dx > 0 && STATE.resultCard > 0) STATE.resultCard--;
      }
      // Force layout flush so browser commits drag-end transform as transition start
      void deck.offsetHeight;
      cardsList().forEach(c => c.style.transition = '');
      updateDeck();
    }
    axis = null; dx = 0; pointerKind = null;
  };
  deck.addEventListener('mousedown', (e) => onStart(e, 'mouse'));
  deck.addEventListener('touchstart', (e) => onStart(e, 'touch'), { passive: true });
  onWindow('mousemove', onMove);
  onWindow('touchmove', onMove, { passive: true });
  onWindow('mouseup', (e) => onEnd(e, 'mouse'));
  onWindow('touchend', (e) => onEnd(e, 'touch'));
  onWindow('touchcancel', (e) => onEnd(e, 'touch'));

  screen.appendChild(deck);
  screen.appendChild(dots);
  app.appendChild(screen);
}

function buildResultCard(r, i) {
  const card = el('div', 'result-card');
  const cat = CAT_MAP[r.cat] || 'home';
  const brand = BRAND_BY_ID[r.brand];
  const brandName = brand ? (brand.name || brand.name_zh) : '—';
  const pos = i === 0 ? T.mainPick[STATE.lang] : T.alt[STATE.lang];
  const positionLabel = `${pos} · ${String(i+1).padStart(2,'0')} / 03`;
  const cardName = STATE.lang === 'zh' ? r.name_zh : (r.name_en || r.name_zh);
  const cardNameAlt = STATE.lang === 'zh' ? (r.name_en || '') : r.name_zh;
  const desc = DESC[cat] ? DESC[cat][STATE.lang] : '';
  const reason = REASON_TAGS[cat] ? REASON_TAGS[cat][STATE.lang] : [];
  const intentTagDisplay = (STATE.intent[0] && resolveIntentLabel(STATE.intent[0])) || (reason[0] || '');
  const tagsHtml = [intentTagDisplay, ...reason.slice(0, 3)].filter(Boolean).map((tg, idx) =>
    `<span class="tag${idx === 0 ? ' primary' : ''}">${tg}</span>`
  ).join('');

  card.innerHTML = `
    <div class="result-meta">
      <div class="result-pos">${positionLabel}</div>
      <div class="result-score">${r.displayScore}%</div>
    </div>
    <div class="result-img">${CAT_SVG[cat] || CAT_SVG.home}</div>
    <div class="result-cat">· ${CAT_LABEL[cat][STATE.lang]} ·</div>
    <div class="result-brand">${brandName}</div>
    <div class="result-name ${STATE.lang==='en'?'lang-en':''}">${cardName}</div>
    ${cardNameAlt ? `<div class="result-name-alt ${STATE.lang==='en'?'lang-en':''}">${cardNameAlt}</div>` : ''}
    <div class="result-price">${localizedPrice(r.price)}</div>
    <div class="result-desc ${STATE.lang==='en'?'lang-en':''}">${desc}</div>
    <div class="result-tags">${tagsHtml}</div>
    <div class="result-cta">
      <button>${t('goBuy')}<span class="platform">· ${PLATFORM[STATE.region]}</span></button>
    </div>
  `;
  card.querySelector('.result-cta button').onclick = () => {
    const qParts = [brandName, STATE.lang === 'zh' ? r.name_zh : (r.name_en || r.name_zh)];
    const q = encodeURIComponent(qParts.filter(Boolean).join(' '));
    let url;
    if (STATE.region === 'cn') url = 'https://list.tmall.com/search_product.htm?q=' + q;
    else if (STATE.region === 'na') url = 'https://www.amazon.com/s?k=' + q;
    else url = 'https://www.lazada.sg/catalog/?q=' + q;
    window.open(url, '_blank', 'noopener,noreferrer');
  };
  return card;
}

function resolveIntentLabel(intentId) {
  for (const tags of Object.values(INTENTS)) {
    const t = tags.find(t => t.id === intentId);
    if (t) return t[STATE.lang];
  }
  return null;
}

function buildRefineCard() {
  const card = el('div', 'result-card');
  const inner = el('div', 'refine-card');
  const tip = TIPS[STATE.tipIndex];
  inner.innerHTML = `
    <div class="refine-title ${STATE.lang==='en'?'lang-en':''}">
      ${T.refineTitle[STATE.lang]}
      <span class="alt">${STATE.lang==='zh'? T.refineTitle.en : T.refineTitle.zh}</span>
    </div>
    <div class="refine-list">
      ${T.refineItems.map((it, i) => `
        <div class="refine-item" data-i="${i}">
          <span>${it[STATE.lang]}</span>
          <span class="arrow">${i === T.refineItems.length - 1 ? '↺' : '→'}</span>
        </div>
      `).join('')}
    </div>
    <div class="refine-tip">
      ${tip[STATE.lang]}
      <span class="alt">${STATE.lang==='zh' ? tip.en : tip.zh}</span>
    </div>
  `;
  inner.querySelectorAll('.refine-item').forEach(item => {
    item.onclick = () => {
      const i = parseInt(item.dataset.i, 10);
      if (i === 0) { STATE.step = 1; render(); }
      else if (i === 1) { STATE.step = 5; render(); }
      else if (i === 2) { STATE.step = 6; render(); }
      else if (i === 3) { STATE.step = 8; render(); }
      else if (i === 4) { Object.assign(STATE, freshStateKeepLang()); render(); }
    };
  });
  card.appendChild(inner);
  return card;
}

// ============== BOOT ==============
render();
</script>
